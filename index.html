<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Quiz · Proteínas 🧬</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d1f;
    --card: #161628;
    --accent: #a78bfa;
    --accent2: #f472b6;
    --correct: #34d399;
    --wrong: #f87171;
    --text: #ede9fe;
    --muted: #8b80a8;
    --border: #2a2545;
  }

  html, body {
    min-height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 14px 60px;
  }

  header {
    text-align: center;
    margin-bottom: 22px;
    width: 100%;
    max-width: 480px;
  }

  .eyebrow {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 6px;
  }

  h1 {
    font-size: clamp(26px, 7vw, 36px);
    font-weight: 800;
    color: #fff;
    line-height: 1.15;
    margin-bottom: 8px;
  }

  h1 span {
    background: linear-gradient(130deg, #fff 20%, var(--accent) 55%, var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .tag-row {
    display: flex;
    gap: 6px;
    justify-content: center;
    flex-wrap: wrap;
    margin: 8px 0 6px;
  }
  .tag {
    background: rgba(167,139,250,0.1);
    border: 1px solid rgba(167,139,250,0.25);
    border-radius: 99px;
    padding: 3px 11px;
    font-size: 11px;
    color: var(--accent);
    font-weight: 600;
  }

  .subtitle { color: var(--muted); font-size: 12px; margin-top: 4px; }

  .progress-wrap {
    width: 100%;
    max-width: 480px;
    margin-bottom: 16px;
  }
  .prog-meta {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 5px;
  }
  .prog-track {
    height: 5px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .prog-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 99px;
    transition: width 0.4s ease;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 22px 18px;
    width: 100%;
    max-width: 480px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
  }

  .q-num {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 10px;
  }

  .q-text {
    font-size: clamp(15px, 4vw, 18px);
    font-weight: 700;
    line-height: 1.45;
    margin-bottom: 20px;
    color: #fff;
  }

  .options { display: flex; flex-direction: column; gap: 9px; }

  .option {
    background: transparent;
    border: 1.5px solid var(--border);
    border-radius: 13px;
    padding: 13px 14px;
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    text-align: left;
    cursor: pointer;
    display: flex;
    align-items: flex-start;
    gap: 11px;
    line-height: 1.45;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    transition: border-color 0.15s, background 0.15s;
    width: 100%;
  }

  .option:active:not(:disabled) {
    background: rgba(167,139,250,0.08);
  }

  .opt-letter {
    width: 26px;
    height: 26px;
    min-width: 26px;
    border-radius: 50%;
    background: var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    transition: background 0.2s;
  }

  .option.correct { border-color: var(--correct); background: rgba(52,211,153,0.08); }
  .option.correct .opt-letter { background: var(--correct); color: #0d1f17; }
  .option.wrong { border-color: var(--wrong); background: rgba(248,113,113,0.08); }
  .option.wrong .opt-letter { background: var(--wrong); color: #fff; }
  .option:disabled { cursor: default; }

  .feedback {
    margin-top: 14px;
    padding: 12px 14px;
    border-radius: 12px;
    font-size: 13px;
    line-height: 1.55;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback.correct-fb {
    background: rgba(52,211,153,0.09);
    border: 1px solid rgba(52,211,153,0.25);
    color: #6ee7b7;
  }
  .feedback.wrong-fb {
    background: rgba(248,113,113,0.09);
    border: 1px solid rgba(248,113,113,0.25);
    color: #fca5a5;
  }

  .btn-next {
    margin-top: 16px;
    width: 100%;
    padding: 15px;
    border-radius: 13px;
    border: none;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    font-family: inherit;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    display: none;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-next.show { display: block; }

  .results {
    display: none;
    width: 100%;
    max-width: 480px;
  }
  .results.show { display: block; }

  .res-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px 18px;
    text-align: center;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
  }

  .score-ring {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    background: conic-gradient(var(--accent) var(--pct, 0%), var(--border) 0);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 18px;
    position: relative;
  }
  .score-ring::before {
    content: '';
    width: 80px; height: 80px;
    border-radius: 50%;
    background: var(--card);
    position: absolute;
  }
  .score-num {
    font-size: 24px;
    font-weight: 800;
    position: relative;
    z-index: 1;
    color: #fff;
  }

  .res-card h2 { font-size: 20px; font-weight: 700; margin-bottom: 6px; color: #fff; }
  .res-card > p { color: var(--muted); font-size: 13px; margin-bottom: 22px; }

  .review-list {
    text-align: left;
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 22px;
  }
  .ri {
    padding: 10px 13px;
    border-radius: 10px;
    font-size: 12px;
    line-height: 1.5;
    border: 1px solid;
  }
  .ri.ok  { border-color: rgba(52,211,153,0.3); background: rgba(52,211,153,0.06); }
  .ri.fail{ border-color: rgba(248,113,113,0.3); background: rgba(248,113,113,0.06); }
  .ri .rl { font-weight: 600; display: block; margin-bottom: 2px; }
  .ri.ok  .rl { color: #6ee7b7; }
  .ri.fail .rl { color: #fca5a5; }
  .ri .ra { color: var(--muted); font-size: 11px; }

  .btn-retry {
    width: 100%;
    padding: 15px;
    border-radius: 13px;
    border: none;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    font-family: inherit;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    touch-action: manipulation;
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">Biología · Biomoléculas Orgánicas</div>
  <h1><span>Proteínas 🧬</span></h1>
  <div class="tag-row">
    <span class="tag">🔗 Aminoácidos</span>
    <span class="tag">📐 Estructura</span>
    <span class="tag">⚙️ Funciones</span>
  </div>
  <p class="subtitle">12 preguntas · Basado en tu resumen</p>
</header>

<div class="progress-wrap">
  <div class="prog-meta">
    <span id="prog-text">Pregunta 1 de 12</span>
    <span id="score-text">0 correctas</span>
  </div>
  <div class="prog-track">
    <div class="prog-fill" id="prog-fill" style="width:8%"></div>
  </div>
</div>

<div class="card" id="quiz-card">
  <div class="q-num" id="q-num">Pregunta 1</div>
  <div class="q-text" id="q-text"></div>
  <div class="options" id="q-options"></div>
  <div class="feedback" id="q-feedback"></div>
  <button class="btn-next" id="btn-next">Siguiente →</button>
</div>

<div class="results" id="results">
  <div class="res-card">
    <div class="score-ring" id="score-ring">
      <span class="score-num" id="score-final"></span>
    </div>
    <h2 id="res-title"></h2>
    <p id="res-sub"></p>
    <div class="review-list" id="review-list"></div>
    <button class="btn-retry" onclick="init()">🔁 Intentar de nuevo</button>
  </div>
</div>

<script>
var Q = [
  {
    q: "¿Con qué elementos químicos están formadas las proteínas?",
    opts: ["C, H y O solamente", "C, H, O y N solamente", "C, H, O, N y S", "C, H, N y P"],
    ans: 2,
    exp: "Las proteínas están formadas por C, H, O, N y S (carbono, hidrógeno, oxígeno, nitrógeno y azufre)."
  },
  {
    q: "¿Qué son los aminoácidos?",
    opts: [
      "Moléculas de grasa que forman las membranas",
      "Las unidades más pequeñas que forman las proteínas",
      "Tipos de azúcares que dan energía",
      "Bases nitrogenadas del ADN"
    ],
    ans: 1,
    exp: "Los aminoácidos son las unidades básicas con las que se construyen las proteínas. Las proteínas son macromoléculas formadas por aminoácidos."
  },
  {
    q: "¿Cuántos aminoácidos existen en la naturaleza?",
    opts: ["4", "12", "20", "64"],
    ans: 2,
    exp: "Existen 20 aminoácidos en la naturaleza. Con distintas combinaciones de ellos se forman todas las proteínas."
  },
  {
    q: "¿Qué tres partes tiene cada aminoácido?",
    opts: [
      "Grupo fosfato, pentosa y base nitrogenada",
      "Grupo carboxilo, grupo amino y radical R",
      "Cadena de carbono, grupo hidroxilo y radical R",
      "Grupo amino, grupo fosfato y radical R"
    ],
    ans: 1,
    exp: "Cada aminoácido tiene: un grupo carboxilo (–COOH), un grupo amino (–NH2) y un radical R que varía según el aminoácido."
  },
  {
    q: "¿Qué hace que un aminoácido sea diferente de otro?",
    opts: [
      "El grupo carboxilo, que cambia en cada uno",
      "El grupo amino, que es distinto en cada aminoácido",
      "El radical R, que es diferente en cada aminoácido",
      "La cantidad de átomos de hidrógeno"
    ],
    ans: 2,
    exp: "Lo que diferencia a un aminoácido de otro es el radical R. El grupo carboxilo y el grupo amino son iguales en todos."
  },
  {
    q: "¿Cómo se llama el enlace que une a los aminoácidos entre sí?",
    opts: ["Enlace glucosídico", "Enlace peptídico", "Enlace fosfodiéster", "Enlace hidrógeno"],
    ans: 1,
    exp: "Los aminoácidos se unen mediante enlaces peptídicos, que conectan el grupo carboxilo de uno con el grupo amino del siguiente. En cada unión se libera agua."
  },
  {
    q: "¿Qué pasa cuando los enlaces de una proteína se rompen?",
    opts: [
      "La proteína se duplica",
      "La proteína se convierte en un lípido",
      "La proteína pierde su forma (desnaturalización)",
      "La proteína gana más aminoácidos"
    ],
    ans: 2,
    exp: "Cuando los enlaces se rompen, la proteína pierde su forma. A ese proceso se lo llama desnaturalización."
  },
  {
    q: "¿Cuál de estas describe la estructura PRIMARIA de una proteína?",
    opts: [
      "La cadena se pliega en forma de ovillo",
      "Varias cadenas terciarias se unen entre sí",
      "La cadena de aminoácidos forma un filamento en un solo plano",
      "La cadena se enrolla en forma de espiral"
    ],
    ans: 2,
    exp: "La estructura primaria es la cadena de aminoácidos formando un filamento en un solo plano, como un hilo o el pelo."
  },
  {
    q: "¿Qué forma tiene la estructura SECUNDARIA de una proteína?",
    opts: [
      "Ovillo o forma globular",
      "Espiral (hélice), como las fibras de colágeno",
      "Filamento plano",
      "Doble cadena unida"
    ],
    ans: 1,
    exp: "En la estructura secundaria, la cadena se enrolla en forma de espiral (hélice), como ocurre en las fibras de colágeno."
  },
  {
    q: "¿Cuál es la estructura más compleja de las proteínas y qué ejemplo tiene?",
    opts: [
      "Secundaria · colágeno",
      "Terciaria · mioglobina",
      "Cuaternaria · hemoglobina",
      "Primaria · queratina"
    ],
    ans: 2,
    exp: "La estructura cuaternaria es la más compleja: se forma cuando varias cadenas terciarias se unen. El ejemplo clásico es la hemoglobina."
  },
  {
    q: "¿Qué función cumple la hemoglobina?",
    opts: [
      "Acelera las reacciones químicas del cuerpo",
      "Defiende al organismo contra enfermedades",
      "Transporta oxígeno por la sangre",
      "Regula el azúcar en sangre"
    ],
    ans: 2,
    exp: "La hemoglobina es una proteína con función de transporte: lleva oxígeno por la sangre."
  },
  {
    q: "¿Cuál de estas es una función ENZIMÁTICA de las proteínas?",
    opts: [
      "El colágeno da resistencia a los tejidos",
      "La insulina regula el azúcar en sangre",
      "La amilasa salival acelera reacciones químicas",
      "La actina permite la contracción muscular"
    ],
    ans: 2,
    exp: "La función enzimática es la de acelerar reacciones químicas (biocatalizadores). La amilasa salival es el ejemplo del resumen. La insulina es hormonal, el colágeno estructural y la actina contráctil."
  }
];

var current = 0, score = 0, answered = [];
var TOTAL = Q.length;

function init() {
  current = 0; score = 0; answered = [];
  document.getElementById('quiz-card').style.display = 'block';
  document.getElementById('results').className = 'results';
  render();
}

function render() {
  var q = Q[current];
  document.getElementById('q-num').textContent = 'Pregunta ' + (current + 1);
  document.getElementById('q-text').textContent = q.q;
  document.getElementById('prog-text').textContent = 'Pregunta ' + (current + 1) + ' de ' + TOTAL;
  document.getElementById('score-text').textContent = score + (score !== 1 ? ' correctas' : ' correcta');
  document.getElementById('prog-fill').style.width = (Math.round((current / TOTAL) * 100) + 8) + '%';

  var fb = document.getElementById('q-feedback');
  fb.className = 'feedback';
  fb.innerHTML = '';
  document.getElementById('btn-next').className = 'btn-next';

  var container = document.getElementById('q-options');
  container.innerHTML = '';
  var letters = ['A','B','C','D'];
  for (var i = 0; i < q.opts.length; i++) {
    (function(idx) {
      var btn = document.createElement('button');
      btn.className = 'option';
      btn.innerHTML = '<span class="opt-letter">' + letters[idx] + '</span><span>' + q.opts[idx] + '</span>';
      btn.addEventListener('click', function() { pick(idx); });
      container.appendChild(btn);
    })(i);
  }
}

function pick(idx) {
  var q = Q[current];
  var btns = document.querySelectorAll('.option');
  for (var i = 0; i < btns.length; i++) btns[i].disabled = true;

  var ok = idx === q.ans;
  if (ok) score++;
  answered.push({ q: q.q, chosen: idx, ans: q.ans, ok: ok, opts: q.opts });

  btns[q.ans].className += ' correct';
  if (!ok) btns[idx].className += ' wrong';

  var fb = document.getElementById('q-feedback');
  fb.textContent = '';
  if (ok) {
    fb.innerHTML = '✅ ¡Correcto! ' + q.exp;
    fb.className = 'feedback show correct-fb';
  } else {
    fb.innerHTML = '❌ Incorrecto. La correcta era: ' + q.opts[q.ans] + '. ' + q.exp;
    fb.className = 'feedback show wrong-fb';
  }

  var btnNext = document.getElementById('btn-next');
  btnNext.textContent = current < TOTAL - 1 ? 'Siguiente →' : 'Ver resultados 🎉';
  btnNext.className = 'btn-next show';
}

document.getElementById('btn-next').addEventListener('click', function() {
  current++;
  if (current < TOTAL) render();
  else showResults();
});

function showResults() {
  document.getElementById('quiz-card').style.display = 'none';
  document.getElementById('results').className = 'results show';

  var pct = Math.round((score / TOTAL) * 100);
  document.getElementById('score-ring').style.setProperty('--pct', pct + '%');
  document.getElementById('score-final').textContent = score + '/' + TOTAL;

  var title, sub;
  if (score === TOTAL)           { title = '¡Perfecto! 🌟';          sub = '12/12. ¡Las proteínas las tenés clavadas!'; }
  else if (score >= TOTAL * 0.8) { title = '¡Muy bien! 💪';          sub = 'Casi todo bien. Repasá las que fallaste.'; }
  else if (score >= TOTAL * 0.6) { title = 'Bien, podés mejorar 📚'; sub = 'Más de la mitad correctas. A repasar un poco.'; }
  else                           { title = 'A repasar proteínas 😅'; sub = 'No te preocupes, con otro repaso va a quedar. 💜'; }

  document.getElementById('res-title').textContent = title;
  document.getElementById('res-sub').textContent = sub;

  var list = document.getElementById('review-list');
  list.innerHTML = '';
  for (var i = 0; i < answered.length; i++) {
    var a = answered[i];
    var d = document.createElement('div');
    d.className = 'ri ' + (a.ok ? 'ok' : 'fail');
    var inner = '<span class="rl">' + (a.ok ? '✅' : '❌') + ' P' + (i+1) + ': ' + a.q + '</span>';
    if (!a.ok) {
      inner += '<span class="ra">Tu respuesta: ' + a.opts[a.chosen] + ' · Correcta: ' + a.opts[a.ans] + '</span>';
    }
    d.innerHTML = inner;
    list.appendChild(d);
  }
}

init();
</script>
</body>
</html>
